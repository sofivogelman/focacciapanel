<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">

  <!-- Fondo círculo crema -->
  <circle cx="100" cy="100" r="96" fill="#f0ede3"/>

  <!-- Borde punteado verde oscuro -->
  <circle cx="100" cy="100" r="91" fill="none" stroke="#2d4a2d" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- Tallo principal -->
  <line x1="100" y1="98" x2="100" y2="52" stroke="#2d4a2d" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Hojas izquierda (rotate 40°) -->
  <ellipse cx="93" cy="91" rx="9" ry="2.5" fill="#2d4a2d" transform="rotate(40,93,91)"/>
  <ellipse cx="92" cy="81" rx="8.5" ry="2.3" fill="#2d4a2d" transform="rotate(40,92,81)"/>
  <ellipse cx="92" cy="71" rx="7.5" ry="2.1" fill="#2d4a2d" transform="rotate(40,92,71)"/>
  <ellipse cx="93" cy="62" rx="6.5" ry="1.9" fill="#2d4a2d" transform="rotate(40,93,62)"/>

  <!-- Hojas derecha (rotate -40°) -->
  <ellipse cx="107" cy="87" rx="9" ry="2.5" fill="#2d4a2d" transform="rotate(-40,107,87)"/>
  <ellipse cx="108" cy="77" rx="8.5" ry="2.3" fill="#2d4a2d" transform="rotate(-40,108,77)"/>
  <ellipse cx="108" cy="67" rx="7.5" ry="2.1" fill="#2d4a2d" transform="rotate(-40,108,67)"/>
  <ellipse cx="107" cy="58" rx="6.5" ry="1.9" fill="#2d4a2d" transform="rotate(-40,107,58)"/>

  <!-- Punta superior -->
  <ellipse cx="100" cy="51" rx="2.8" ry="5" fill="#2d4a2d"/>

  <!-- "Focaccia" serif bold -->
  <text x="100" y="130"
    text-anchor="middle"
    font-family="Georgia,'Times New Roman',serif"
    font-size="30"
    font-weight="bold"
    fill="#2d4a2d">Focaccia</text>

  <!-- "ARTESANAL" caps espaciado -->
  <text x="100" y="150"
    text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif"
    font-size="11"
    fill="#5a7a5a"
    letter-spacing="4">ARTESANAL</text>

</svg>
